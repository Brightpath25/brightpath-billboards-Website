<!-- Hidden Netlify Forms detection file — DO NOT DELETE -->
<!-- Netlify scans static HTML at build time to register forms. -->
<!-- Because /quote is a client-rendered React page, this file ensures -->
<!-- the "quote" form is detected and registered in Netlify Dashboard. -->
<html>
<head><title>Forms</title></head>
<body>
  <form name="quote" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="fullName" />
    <input type="text" name="businessName" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="campaignType" />
    <input type="text" name="startDate" />
    <input type="text" name="duration" />
    <input type="text" name="budget" />
    <input type="text" name="targetAreas" />
    <input type="text" name="creativeNeeds" />
    <textarea name="comments"></textarea>
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
